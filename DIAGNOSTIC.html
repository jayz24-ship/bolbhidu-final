<!DOCTYPE html>
<html>
<head>
    <title>Diagnostic Tool</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #00ff00; }
        button { padding: 10px 20px; margin: 10px; font-size: 16px; cursor: pointer; }
        .clear { background: #ff4444; color: white; }
        .test { background: #4444ff; color: white; }
        pre { background: #000; padding: 10px; border: 1px solid #00ff00; }
        h2 { color: #ffff00; }
    </style>
</head>
<body>
    <h1>🔍 Diagnostic Tool</h1>
    
    <h2>Current State:</h2>
    <pre id="state"></pre>
    
    <h2>Actions:</h2>
    <button class="clear" onclick="clearAll()">Clear All Storage</button>
    <button class="test" onclick="checkState()">Check State</button>
    <button class="test" onclick="testBackend()">Test Backend</button>
    
    <h2>Results:</h2>
    <pre id="results"></pre>
    
    <script>
        function checkState() {
            const state = {
                jwt_token: localStorage.getItem('jwt_token'),
                user_data: localStorage.getItem('user_data'),
                user_id: localStorage.getItem('user_id'),
                currentUrl: window.location.href,
                allKeys: Object.keys(localStorage)
            };
            document.getElementById('state').textContent = JSON.stringify(state, null, 2);
        }
        
        function clearAll() {
            localStorage.clear();
            sessionStorage.clear();
            document.getElementById('results').textContent = '✅ All storage cleared!\n\nNow:\n1. Close this tab\n2. Go to http://localhost:3000\n3. Should see Landing Page';
            checkState();
        }
        
        async function testBackend() {
            try {
                const response = await fetch('http://localhost:8080/health');
                const data = await response.json();
                document.getElementById('results').textContent = '✅ Backend is running!\n' + JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('results').textContent = '❌ Backend error:\n' + error.message;
            }
        }
        
        // Auto-check on load
        checkState();
    </script>
</body>
</html>
